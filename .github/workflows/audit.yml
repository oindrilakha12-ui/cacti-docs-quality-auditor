name: Cacti Docs Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout auditor
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Clone Hyperledger Cacti
        run: |
          git clone --depth=1 https://github.com/hyperledger-cacti/cacti.git ../cacti

      - name: Run documentation audit
        run: npm run audit
        continue-on-error: true
        env:
          CACTI_REPO_PATH: ../cacti